name: Build and Deploy Hexo

on:
  push:
    branches:
      - master  # 或者你的默认分支

permissions:
  contents: write  # 允许对仓库内容进行写操作

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 确保获取完整的 git 历史

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'  # 使用兼容的 Node.js 版本

    - name: Install Dependencies
      run: npm install

    - name: Build Site
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
